name: 🏭 Build Dashboard Curicó

on:
  push:
    paths:
      - 'data/**.xlsx'
      - 'data/**.xls'
      - 'templates/**.html'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl xlrd

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Commit y push dashboard
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add docs/dashboard.html
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "🔄 Auto-build $(date '+%d/%m/%Y %H:%M')"
            git push
          )
